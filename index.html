<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allicon Parks - SVG Icon Library</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
    </script>
    <style>
        :root {
            --bg: #f1f5f0;
            --surface: #ffffff;
            --surface-hover: #f0fdf6;
            --text: #1a2e1f;
            --text-secondary: #556b5c;
            --text-muted: #7d8f82;
            --primary: #059669;
            --primary-light: #d1fae5;
            --primary-dark: #047857;
            --border: #dde8df;
            --border-light: #e8f0e9;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.10);
            --radius: 12px;
            --nav-height: 64px;
            --panel-width: 400px;
            --font: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            --transition: 0.2s ease;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding-top: var(--nav-height);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            height: var(--nav-height);
            display: flex;
            align-items: center;
            backdrop-filter: blur(12px);
        }
        .nav-main {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 24px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
            flex-shrink: 0;
        }
        .nav-brand .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: linear-gradient(135deg, #059669, #047857);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
        }
        .nav-brand .brand-text {
            font-size: 1.25rem;
            font-weight: 700;
        }
        .nav-brand .brand-text span {
            color: var(--primary);
        }
        .nav-search-wrap {
            flex: 1;
            min-width: 200px;
            max-width: 420px;
            position: relative;
        }
        .nav-search-wrap input {
            width: 100%;
            height: 42px;
            border: 2px solid var(--border-light);
            border-radius: 24px;
            padding: 0 16px 0 42px;
            font-size: 0.95rem;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: all var(--transition);
        }
        .nav-search-wrap input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px var(--primary-light);
        }
        .nav-search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 6px;
            border-radius: 50%;
            display: none;
            z-index: 1;
        }
        .nav-search-clear.visible {
            display: flex;
        }
        .btn-download-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .btn-download-nav:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 16px rgba(5, 150, 105, 0.35);
        }
        .btn-download-nav:disabled {
            background: #cbd5d1;
            cursor: not-allowed;
        }
        .btn-download-nav .badge {
            background: #fff;
            color: var(--primary);
            border-radius: 20px;
            padding: 2px 9px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .selected-count-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        /* MAIN LAYOUT */
        .app-container {
            display: flex;
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 16px 24px;
            gap: 24px;
        }
        @media (max-width: 900px) {
            .app-container {
                flex-direction: column;
                padding: 12px;
            }
        }

        .icon-grid-area {
            flex: 1;
            min-width: 0;
        }
        .info-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .results-text {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .btn-clear-selection {
            font-size: 0.82rem;
            color: var(--primary);
            cursor: pointer;
            background: none;
            border: none;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 16px;
        }
        .btn-clear-selection:hover {
            background: var(--primary-light);
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }
        @media (max-width: 600px) {
            .icon-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 8px;
            }
        }

        .icon-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 2px solid var(--border-light);
            padding: 16px 10px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            min-height: 140px;
            justify-content: center;
        }
        .icon-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
            transform: translateY(-3px);
            background: var(--surface-hover);
        }
        .icon-card.selected {
            border-color: var(--primary);
            background: var(--primary-light);
            box-shadow: 0 0 0 5px rgba(5, 150, 105, 0.08), var(--shadow);
        }
        .icon-card.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 10px;
            width: 24px;
            height: 24px;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 2;
        }
        .icon-preview {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-preview img {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }
        .icon-name {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-align: center;
            word-break: break-word;
            line-height: 1.2;
            max-width: 100%;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .select-btn-card {
            position: absolute;
            top: 8px;
            right: 10px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: #fff;
            cursor: pointer;
            z-index: 3;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: transparent;
        }
        .icon-card:hover .select-btn-card,
        .icon-card.selected .select-btn-card {
            border-color: var(--primary);
            color: var(--primary);
        }
        .icon-card.selected .select-btn-card {
            background: var(--primary);
            color: #fff;
        }

        /* RIGHT PANEL (permanent) */
        .code-panel {
            width: var(--panel-width);
            flex-shrink: 0;
            background: #fff;
            border-radius: var(--radius);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - var(--nav-height) - 32px);
            position: sticky;
            top: calc(var(--nav-height) + 16px);
            overflow: hidden;
        }
        @media (max-width: 900px) {
            .code-panel {
                width: 100%;
                max-height: 50vh;
                position: static;
                margin-top: 16px;
            }
        }
        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .panel-icon-preview {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg);
            border-radius: var(--radius);
            border: 2px dashed var(--border);
        }
        .panel-icon-preview img {
            width: 72px;
            height: 72px;
        }
        .code-block-wrap {
            background: #1e293b;
            border-radius: var(--radius);
            overflow: hidden;
        }
        .code-block-wrap .code-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            background: #334155;
            color: #cbd5e1;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .btn-copy-panel {
            background: #475569;
            color: #e2e8f0;
            border: none;
            padding: 5px 12px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.72rem;
            transition: all var(--transition);
        }
        .btn-copy-panel:hover {
            background: #64748b;
        }
        .code-block-wrap pre {
            padding: 16px;
            margin: 0;
            font-family: var(--mono);
            font-size: 0.8rem;
            line-height: 1.6;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
            cursor: pointer;
        }
        .panel-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
        }
        .btn-select {
            background: #fff;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-select.selected {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .toast-container {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            align-items: center;
        }
        .toast {
            background: #1e293b;
            color: #fff;
            padding: 12px 22px;
            border-radius: 28px;
            font-size: 0.88rem;
            animation: toastIn 0.35s ease, toastOut 0.35s ease 2.2s forwards;
            pointer-events: auto;
        }
        @keyframes toastIn {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes toastOut {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(30px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-main">
            <a href="#" class="nav-brand">
                <div class="logo-icon">🌿</div>
                <div class="brand-text">Allicon <span>Parks</span></div>
            </a>
            <div class="nav-search-wrap">
                <svg style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);z-index:1;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" placeholder="Search icons..." autocomplete="off">
                <button class="nav-search-clear" id="searchClear">✕</button>
            </div>
            <div class="nav-actions">
                <span class="selected-count-text" id="selectedCountText">0 selected</span>
                <button class="btn-download-nav" id="btnDownloadNav" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span class="btn-label">Download</span>
                    <span class="badge" id="badgeCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT + PANEL -->
    <div class="app-container">
        <!-- LEFT: Icon Grid -->
        <section class="icon-grid-area">
            <div class="info-bar">
                <span class="results-text" id="resultsText">Loading icons...</span>
                <button class="btn-clear-selection" id="btnClearSelection" style="display:none;">Clear selection</button>
            </div>
            <div class="icon-grid" id="iconGrid">
                <div style="grid-column:1/-1;text-align:center;padding:40px;">📂 Loading icons...</div>
            </div>
        </section>

        <!-- RIGHT: Permanent Code Panel -->
        <aside class="code-panel" id="codePanel">
            <div class="panel-header" id="panelHeader">
                <span>🔍 Select an icon</span>
            </div>
            <div class="panel-body">
                <div class="panel-icon-preview" id="panelIconPreview">
                    <span style="color:var(--text-muted);">No icon selected</span>
                </div>
                <div class="code-block-wrap">
                    <div class="code-label">
                        <span>SVG Code</span>
                        <button class="btn-copy-panel" id="btnCopyPanel">📋 Copy</button>
                    </div>
                    <pre id="panelCodeBlock" style="color:#94a3b8;">Click on any icon to view its SVG code</pre>
                </div>
                <div class="panel-actions">
                    <button class="btn btn-select" id="btnPanelSelect" disabled>☆ Select Icon</button>
                    <button class="btn btn-primary" id="btnPanelDownload" disabled>⬇ Download</button>
                </div>
            </div>
        </aside>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            // DOM elements
            const searchInput = document.getElementById('searchInput');
            const searchClear = document.getElementById('searchClear');
            const iconGrid = document.getElementById('iconGrid');
            const resultsText = document.getElementById('resultsText');
            const btnDownloadNav = document.getElementById('btnDownloadNav');
            const badgeCount = document.getElementById('badgeCount');
            const selectedCountText = document.getElementById('selectedCountText');
            const btnClearSelection = document.getElementById('btnClearSelection');
            const panelHeader = document.getElementById('panelHeader');
            const panelIconPreview = document.getElementById('panelIconPreview');
            const panelCodeBlock = document.getElementById('panelCodeBlock');
            const btnCopyPanel = document.getElementById('btnCopyPanel');
            const btnPanelSelect = document.getElementById('btnPanelSelect');
            const btnPanelDownload = document.getElementById('btnPanelDownload');
            const toastContainer = document.getElementById('toastContainer');

            let allIcons = [];
            let selectedIcons = new Set();
            let searchQuery = '';
            let currentPanelIcon = null;
            let svgCache = new Map(); // path -> svg text (preloaded)

            function formatDisplayName(filename) {
                let name = filename.replace(/\.svg$/i, '');
                name = name.replace(/[-_]+/g, ' ').replace(/\s+/g, ' ').trim();
                name = name.replace(/\b\w/g, c => c.toUpperCase());
                return name || filename;
            }

            function getIconPath(name, category) {
                return category === 'filled' ? `svg/filled/${name}.svg` : `svg/${name}.svg`;
            }

            function showToast(msg) {
                const t = document.createElement('div');
                t.className = 'toast';
                t.textContent = msg;
                toastContainer.appendChild(t);
                setTimeout(() => t.remove(), 2700);
            }

            // Preload all SVGs after icons.json is loaded
            async function preloadAllSVGs(icons) {
                const promises = icons.map(async (icon) => {
                    try {
                        const resp = await fetch(icon.path);
                        const text = await resp.text();
                        svgCache.set(icon.path, text);
                    } catch (e) {
                        svgCache.set(icon.path, null); // mark as failed
                    }
                });
                await Promise.all(promises);
            }

            async function loadIcons() {
                try {
                    const resp = await fetch('icons.json');
                    const raw = await resp.json();
                    allIcons = raw.map(item => ({
                        name: item.name,
                        category: item.category,
                        path: getIconPath(item.name, item.category),
                        displayName: formatDisplayName(item.name),
                    }));
                    resultsText.textContent = `Preloading ${allIcons.length} SVGs...`;
                    await preloadAllSVGs(allIcons);
                    renderIcons();
                } catch (e) {
                    allIcons = [];
                    iconGrid.innerHTML =
                        '<div style="grid-column:1/-1;text-align:center;padding:60px;">❌ Could not load icons.json</div>';
                    resultsText.textContent = 'Error loading icons';
                }
            }

            function getFilteredIcons() {
                if (!searchQuery.trim()) return allIcons;
                const q = searchQuery.trim().toLowerCase();
                return allIcons.filter(i => i.displayName.toLowerCase().includes(q) || i.name.toLowerCase().includes(
                    q));
            }

            function renderIcons() {
                const filtered = getFilteredIcons();
                iconGrid.innerHTML = '';
                if (!allIcons.length) return;
                if (!filtered.length) {
                    iconGrid.innerHTML =
                        '<div style="grid-column:1/-1;text-align:center;padding:60px;">🔍 No icons match</div>';
                    resultsText.textContent = '0 results';
                    updateSelectionUI();
                    return;
                }
                resultsText.innerHTML =
                    `Showing <strong>${filtered.length}</strong> icon${filtered.length>1?'s':''}`;

                filtered.forEach(icon => {
                    const card = document.createElement('div');
                    card.className = 'icon-card';
                    if (selectedIcons.has(icon.path)) card.classList.add('selected');
                    card.dataset.path = icon.path;
                    card.innerHTML = `
                        <div class="icon-preview"><img src="${icon.path}" alt="${icon.displayName}" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=font-size:28px;opacity:0.5>📄</span>'"></div>
                        <span class="icon-name">${icon.displayName}</span>
                        <button class="select-btn-card">${selectedIcons.has(icon.path)?'✓':'☆'}</button>
                    `;
                    const selectBtn = card.querySelector('.select-btn-card');
                    selectBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleSelectIcon(icon, card);
                    });
                    card.addEventListener('click', (e) => {
                        if (e.target === selectBtn) return;
                        setPanelIcon(icon);
                    });
                    iconGrid.appendChild(card);
                });
                updateSelectionUI();
            }

            function toggleSelectIcon(icon, card) {
                if (selectedIcons.has(icon.path)) {
                    selectedIcons.delete(icon.path);
                } else {
                    selectedIcons.add(icon.path);
                }
                if (card) {
                    card.classList.toggle('selected', selectedIcons.has(icon.path));
                    card.querySelector('.select-btn-card').textContent = selectedIcons.has(icon.path) ? '✓' : '☆';
                }
                if (currentPanelIcon && currentPanelIcon.path === icon.path) updatePanelButtons();
                updateSelectionUI();
            }

            function updateSelectionUI() {
                const count = selectedIcons.size;
                badgeCount.textContent = count;
                selectedCountText.textContent = `${count} selected`;
                btnDownloadNav.disabled = count === 0;
                btnClearSelection.style.display = count ? 'inline-block' : 'none';
            }

            function clearAllSelections() {
                selectedIcons.clear();
                renderIcons();
                if (currentPanelIcon) updatePanelButtons();
                showToast('Selection cleared');
            }

            function setPanelIcon(icon) {
                currentPanelIcon = icon;
                // Update header
                panelHeader.innerHTML = `<img src="${icon.path}" width="24" height="24" style="border-radius:4px;"> ${icon.displayName}`;
                // Preview
                panelIconPreview.innerHTML = `<img src="${icon.path}" alt="${icon.displayName}">`;
                // Code from cache (instant)
                const svgText = svgCache.get(icon.path);
                if (svgText !== undefined && svgText !== null) {
                    panelCodeBlock.textContent = svgText;
                } else if (svgText === null) {
                    panelCodeBlock.textContent = '<!-- SVG failed to load -->';
                } else {
                    panelCodeBlock.textContent = 'Loading...';
                }
                // Enable buttons
                btnPanelSelect.disabled = false;
                btnPanelDownload.disabled = false;
                btnCopyPanel.style.display = '';
                updatePanelButtons();
                btnCopyPanel.textContent = '📋 Copy';
            }

            function updatePanelButtons() {
                if (!currentPanelIcon) {
                    btnPanelSelect.textContent = '☆ Select Icon';
                    btnPanelSelect.classList.remove('selected');
                    btnPanelSelect.disabled = true;
                    btnPanelDownload.disabled = true;
                    return;
                }
                const selected = selectedIcons.has(currentPanelIcon.path);
                btnPanelSelect.textContent = selected ? '✓ Selected' : '☆ Select Icon';
                btnPanelSelect.classList.toggle('selected', selected);
            }

            function copyPanelCode() {
                const code = panelCodeBlock.textContent;
                if (!code || code.startsWith('<!--') || code === 'Click on any icon to view its SVG code') {
                    showToast('No code to copy');
                    return;
                }
                navigator.clipboard.writeText(code).then(() => {
                    btnCopyPanel.textContent = '✓ Copied!';
                    showToast('Copied to clipboard');
                    setTimeout(() => btnCopyPanel.textContent = '📋 Copy', 2000);
                }).catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = code;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast('Copied');
                });
            }

            function downloadPanelIcon() {
                if (!currentPanelIcon) return;
                const code = panelCodeBlock.textContent;
                if (!code || code.startsWith('<!--')) {
                    showToast('No code available');
                    return;
                }
                const blob = new Blob([code], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = currentPanelIcon.name + '.svg';
                a.click();
                URL.revokeObjectURL(url);
                showToast(`Downloaded ${currentPanelIcon.displayName}`);
            }

            async function downloadSelectedZip() {
                if (selectedIcons.size === 0) return;
                if (selectedIcons.size === 1) {
                    const path = [...selectedIcons][0];
                    const icon = allIcons.find(i => i.path === path);
                    const svgText = svgCache.get(path);
                    if (svgText) {
                        const blob = new Blob([svgText], { type: 'image/svg+xml' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = (icon?.name || 'icon') + '.svg';
                        a.click();
                        URL.revokeObjectURL(url);
                        showToast('Downloaded');
                    } else {
                        showToast('SVG not cached');
                    }
                    return;
                }
                showToast('Creating ZIP...');
                const zip = new JSZip();
                const folder = zip.folder('allicom-parks-icons');
                [...selectedIcons].forEach(path => {
                    const svgText = svgCache.get(path);
                    if (svgText) {
                        const icon = allIcons.find(i => i.path === path);
                        folder.file((icon?.name || path.split('/').pop()) + '.svg', svgText);
                    }
                });
                const blob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'allicom-parks-icons.zip';
                a.click();
                URL.revokeObjectURL(url);
                showToast(`ZIP with ${selectedIcons.size} icons downloaded`);
            }

            // Event listeners
            searchInput.addEventListener('input', () => {
                searchQuery = searchInput.value;
                searchClear.classList.toggle('visible', !!searchQuery.trim());
                renderIcons();
            });
            searchClear.addEventListener('click', () => {
                searchInput.value = '';
                searchQuery = '';
                searchClear.classList.remove('visible');
                searchInput.focus();
                renderIcons();
            });
            btnDownloadNav.addEventListener('click', downloadSelectedZip);
            btnClearSelection.addEventListener('click', clearAllSelections);
            btnCopyPanel.addEventListener('click', copyPanelCode);
            panelCodeBlock.addEventListener('click', copyPanelCode);
            btnPanelSelect.addEventListener('click', () => {
                if (!currentPanelIcon) return;
                const card = document.querySelector(`.icon-card[data-path="${CSS.escape(currentPanelIcon.path)}"]`);
                toggleSelectIcon(currentPanelIcon, card);
            });
            btnPanelDownload.addEventListener('click', downloadPanelIcon);
            document.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    searchInput.focus();
                }
            });

            // Start
            loadIcons();
        })();
    </script>
</body>
</html>
